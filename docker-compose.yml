services:

  # ── Shared database ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Broadcast (no deps — everything publishes to it) ─────────────────────────
  broadcast:
    build: ./services/broadcast
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      AIRPORT_TOKEN: ${AIRPORT_TOKEN:-}
      HOTEL_TOKEN: ${HOTEL_TOKEN:-}
      BEACH_TOKEN: ${BEACH_TOKEN:-}
      PARROT_TOKEN: ${PARROT_TOKEN:-}
      FE_TOKEN: ${FE_TOKEN:-}
      ADMIN_PASSCODE: ${VITE_ADMIN_PASSCODE:-}
      AIRPORT_SERVICE_URL: http://airport:3001
      HOTEL_SERVICE_URL: http://hotel:3000
      BEACH_SERVICE_URL: http://beach:8080
      CROWD_POLL_INTERVAL_MS: ${CROWD_POLL_INTERVAL_MS:-5000}
      CROWD_CALM_MAX: ${CROWD_CALM_MAX:-0.34}
      CROWD_BUSY_MIN: ${CROWD_BUSY_MIN:-0.67}
      AIRPORT_QUEUE_SOFT_CAP: ${AIRPORT_QUEUE_SOFT_CAP:-10}

  # ── Airport ───────────────────────────────────────────────────────────────────
  airport:
    build: ./services/airport
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_PATH: /data/airport.db
      BROADCAST_SERVICE_URL: http://broadcast:3002
      SIMULATION_START_TIME: ${SIMULATION_START_TIME:-2026-06-20T00:00:00Z}
      GAME_SPEED: ${GAME_SPEED:-300}
      EU_GATES: ${EU_GATES:-3}
      ALL_GATES: ${ALL_GATES:-2}
      PROCESSING_TIME_EU: ${PROCESSING_TIME_EU:-300}
      PROCESSING_TIME_ALL: ${PROCESSING_TIME_ALL:-600}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
    volumes:
      - airport_data:/data
    depends_on:
      - broadcast

  # ── Hotel ─────────────────────────────────────────────────────────────────────
  hotel:
    build: ./services/hotel
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hotel
      AIRPORT_SERVICE_URL: http://airport:3001
      BROADCAST_SERVICE_URL: http://broadcast:3002
      SIMULATION_START_TIME: ${SIMULATION_START_TIME:-2026-06-20T00:00:00Z}
      GAME_SPEED: ${GAME_SPEED:-300}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      broadcast:
        condition: service_started

  # ── Beach ─────────────────────────────────────────────────────────────────────
  beach:
    build: ./services/beach
    ports:
      - "8090:8090"
    environment:
      APP_PORT: 8090
      JDBC_URL: jdbc:postgresql://postgres:5432/beach
      DB_USER: postgres
      DB_PASSWORD: postgres
      BROADCAST_SERVICE_URL: http://broadcast:3002
      ADMIN_PASSCODE: ${VITE_ADMIN_PASSCODE:-}
      BEACH_TOKEN: ${BEACH_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      broadcast:
        condition: service_started

  # ── Parrot (LLM assistant) — round-robin pool of 2 per the grading sheet ─────
  parrot:
    build: ./services/parrot
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-meta-llama/llama-3.1-8b-instruct}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.4}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-600}
      LLM_TOP_P: ${LLM_TOP_P:-1.0}
      AIRPORT_SERVICE_URL: http://airport:3001
      HOTEL_SERVICE_URL: http://hotel:3000
      BEACH_SERVICE_URL: http://beach:8090
      BROADCAST_SERVICE_URL: http://broadcast:3002
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
    depends_on:
      - airport
      - hotel
      - broadcast

  parrot-b:
    build: ./services/parrot
    environment:
      PORT: 3003
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-meta-llama/llama-3.1-8b-instruct}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.4}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-600}
      LLM_TOP_P: ${LLM_TOP_P:-1.0}
      AIRPORT_SERVICE_URL: http://airport:3001
      HOTEL_SERVICE_URL: http://hotel:3000
      BEACH_SERVICE_URL: http://beach:8090
      BROADCAST_SERVICE_URL: http://broadcast:3002
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
    depends_on:
      - airport
      - hotel
      - broadcast

  # ── Dining ────────────────────────────────────────────────────────────────────
  dining:
    build: ./services/dining
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dining
      BROADCAST_SERVICE_URL: http://broadcast:3002
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      broadcast:
        condition: service_started

  # ── Gateway ───────────────────────────────────────────────────────────────────
  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      AIRPORT_SERVICE_URL: http://airport:3001
      HOTEL_SERVICE_URL: http://hotel:3000
      BEACH_SERVICE_URL: http://beach:8090
      BROADCAST_SERVICE_URL: http://broadcast:3002
      PARROT_SERVICE_URL: http://parrot:3003,http://parrot-b:3003
      DINING_SERVICE_URL: http://dining:3004
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
      GATEWAY_CACHE_TTL: ${GATEWAY_CACHE_TTL:-0}
      GATEWAY_RATE_LIMIT: ${GATEWAY_RATE_LIMIT:-0}
      GATEWAY_RATE_WINDOW: ${GATEWAY_RATE_WINDOW:-1m}
    depends_on:
      - airport
      - hotel
      - beach
      - broadcast
      - parrot
      - parrot-b
      - dining

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_GATEWAY_URL: ${VITE_GATEWAY_URL:-http://localhost:8000}
        VITE_MOCK: ${VITE_MOCK:-false}
        VITE_ADMIN_PASSCODE: ${VITE_ADMIN_PASSCODE:-}
        VITE_TRAFFIC_GENERATOR: ${VITE_TRAFFIC_GENERATOR:-on}
        VITE_PARROT_CHAT_COOLDOWN_MS: ${VITE_PARROT_CHAT_COOLDOWN_MS:-30000}
        VITE_SIMULATION_START_TIME: ${VITE_SIMULATION_START_TIME:-2026-06-20T00:00:00Z}
        VITE_GAME_SPEED: ${VITE_GAME_SPEED:-300}
    ports:
      - "5173:80"
    depends_on:
      - gateway

  # ── Observability ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    depends_on:
      - gateway
      - airport
      - hotel
      - beach
      - broadcast
      - parrot

  grafana:
    image: grafana/grafana:10.4.2
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3010:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  airport_data:
  prometheus_data:
  grafana_data:
