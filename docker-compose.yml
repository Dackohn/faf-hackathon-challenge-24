services:

  # ── Shared database ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── DB init — creates the per-service databases idempotently on EVERY deploy.
  # Replaces the init-db.sql bind mount, which only runs on a fresh volume (and
  # didn't apply on the managed host), leaving an existing volume without the
  # hotel/beach databases. This runs each deploy and self-heals that state.
  db-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
    entrypoint:
      - sh
      - -c
      - |
        for db in hotel beach; do
          if psql -tAc "SELECT 1 FROM pg_database WHERE datname='$$db'" | grep -q 1; then
            echo "database $$db already exists";
          else
            psql -c "CREATE DATABASE $$db" && echo "created database $$db";
          fi
        done
    restart: "no"

  # ── Broadcast (no deps — everything publishes to it) ─────────────────────────
  broadcast:
    build: ./services/broadcast
    expose:
      - "3002"
    environment:
      PORT: 3002

  # ── Airport ───────────────────────────────────────────────────────────────────
  airport:
    build: ./services/airport
    expose:
      - "3001"
    environment:
      PORT: 3001
      DATABASE_PATH: /data/airport.db
      BROADCAST_SERVICE_URL: http://broadcast:3002
      SIMULATION_START_TIME: ${SIMULATION_START_TIME:-2026-06-20T00:00:00Z}
      GAME_SPEED: ${GAME_SPEED:-300}
      EU_GATES: ${EU_GATES:-3}
      ALL_GATES: ${ALL_GATES:-2}
      PROCESSING_TIME_EU: ${PROCESSING_TIME_EU:-300}
      PROCESSING_TIME_ALL: ${PROCESSING_TIME_ALL:-600}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
    volumes:
      - airport_data:/data
    depends_on:
      - broadcast

  # ── Hotel ─────────────────────────────────────────────────────────────────────
  hotel:
    build: ./services/hotel
    expose:
      - "3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hotel
      AIRPORT_SERVICE_URL: http://airport:3001
      BROADCAST_SERVICE_URL: http://broadcast:3002
      SIMULATION_START_TIME: ${SIMULATION_START_TIME:-2026-06-20T00:00:00Z}
      GAME_SPEED: ${GAME_SPEED:-300}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
    depends_on:
      db-init:
        condition: service_completed_successfully
      broadcast:
        condition: service_started

  # ── Beach ─────────────────────────────────────────────────────────────────────
  beach:
    build: ./services/beach
    expose:
      - "8080"
    environment:
      APP_PORT: 8080
      JDBC_URL: jdbc:postgresql://postgres:5432/beach
      DB_USER: postgres
      DB_PASSWORD: postgres
      BROADCAST_SERVICE_URL: http://broadcast:3002
    depends_on:
      db-init:
        condition: service_completed_successfully
      broadcast:
        condition: service_started

  # ── Parrot (LLM assistant) — round-robin pool of 2 per the grading sheet ─────
  parrot:
    build: ./services/parrot
    expose:
      - "3003"
    environment:
      PORT: 3003
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-meta-llama/llama-3.1-8b-instruct}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.4}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-600}
      LLM_TOP_P: ${LLM_TOP_P:-1.0}
      AIRPORT_SERVICE_URL: http://airport:3001
      HOTEL_SERVICE_URL: http://hotel:3000
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
    depends_on:
      - airport
      - hotel

  parrot-b:
    build: ./services/parrot
    environment:
      PORT: 3003
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-meta-llama/llama-3.1-8b-instruct}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.4}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-600}
      LLM_TOP_P: ${LLM_TOP_P:-1.0}
      AIRPORT_SERVICE_URL: http://airport:3001
      HOTEL_SERVICE_URL: http://hotel:3000
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
    depends_on:
      - airport
      - hotel

  # ── Gateway ───────────────────────────────────────────────────────────────────
  gateway:
    build: ./gateway
    expose:
      - "8000"
    environment:
      PORT: 8000
      AIRPORT_SERVICE_URL: http://airport:3001
      HOTEL_SERVICE_URL: http://hotel:3000
      BEACH_SERVICE_URL: http://beach:8080
      BROADCAST_SERVICE_URL: http://broadcast:3002
      PARROT_SERVICE_URL: http://parrot:3003,http://parrot-b:3003
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
      GATEWAY_CACHE_TTL: ${GATEWAY_CACHE_TTL:-0}
      GATEWAY_RATE_LIMIT: ${GATEWAY_RATE_LIMIT:-0}
      GATEWAY_RATE_WINDOW: ${GATEWAY_RATE_WINDOW:-1m}
    depends_on:
      - airport
      - hotel
      - beach
      - broadcast
      - parrot
      - parrot-b

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_GATEWAY_URL: ${VITE_GATEWAY_URL:-http://localhost:8000}
        VITE_MOCK: ${VITE_MOCK:-false}
        VITE_ADMIN_PASSCODE: ${VITE_ADMIN_PASSCODE:-}
        VITE_TRAFFIC_GENERATOR: ${VITE_TRAFFIC_GENERATOR:-on}
        VITE_PARROT_CHAT_COOLDOWN_MS: ${VITE_PARROT_CHAT_COOLDOWN_MS:-30000}
        VITE_SIMULATION_START_TIME: ${VITE_SIMULATION_START_TIME:-2026-06-20T00:00:00Z}
        VITE_GAME_SPEED: ${VITE_GAME_SPEED:-300}
    expose:
      - "80"
    depends_on:
      - gateway

volumes:
  postgres_data:
  airport_data:
